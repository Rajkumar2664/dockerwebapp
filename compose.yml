version: "3.9"

services:
  devopsdb:
    image: rajubingi2664/dockerautodemo:db
    ports:
      - "3307:3306"
    deploy:
      replicas: 3
    networks:
      - mynetwork

  application:
    image: rajubingi2664/dockerautodemo:app
    ports:
      - "1112:8080"
    deploy:
      replicas: 3
    depends_on:
      - devopsdb
    networks:
      - mynetwork

networks:
  mynetwork:
    driver: overlay
